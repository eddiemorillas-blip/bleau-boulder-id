<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 32px 20px 24px; text-align: center; border-bottom: 2px solid #2a2a4a; }

.stats { display: flex; justify-content: center; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
.stat { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 8px 16px; }
.stat-num { font-size: 22px; font-weight: 700; color: #64b5f6; }
.stat-label { font-size: 11px; color: #8888aa; text-transform: uppercase; letter-spacing: 1px; }
.view-tabs { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
.view-tab { background: rgba(255,255,255,0.08); border: 1px solid #2a2a4a; color: #8888aa; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.view-tab:hover { background: rgba(100,181,246,0.15); color: #64b5f6; }
.view-tab.active { background: rgba(100,181,246,0.2); border-color: #64b5f6; color: #64b5f6; }
.filters { padding: 16px 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; max-width: 800px; margin: 0 auto; }
.filters label { font-size: 12px; color: #8888aa; text-transform: uppercase; letter-spacing: 1px; margin-right: 2px; }
.filters select, .filters input[type="text"] { background: #1a1a2e; border: 1px solid #2a2a4a; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 14px; }
.filters input[type="text"] { width: 180px; }
.slider-group { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.slider-group input[type="range"] { -webkit-appearance: none; appearance: none; width: 100px; height: 6px; background: #2a2a4a; border-radius: 3px; outline: none; cursor: pointer; }
.slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #64b5f6; border-radius: 50%; cursor: pointer; border: 2px solid #1a1a2e; }
.slider-group input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: #64b5f6; border-radius: 50%; cursor: pointer; border: 2px solid #1a1a2e; }
.slider-val { font-size: 13px; font-weight: 600; color: #64b5f6; min-width: 32px; text-align: center; }
.container { max-width: 800px; margin: 0 auto; padding: 0 12px 40px; }
#mapView { display: none; width: 100%; height: calc(100vh - 260px); min-height: 500px; }
.region-section { margin-bottom: 8px; }
.region-toggle { background: linear-gradient(135deg, #1a1a2e 0%, #1c2340 100%); border: 1px solid #2a3a5a; border-radius: 12px; padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s; user-select: none; }
.region-toggle:hover { background: linear-gradient(135deg, #1e2040 0%, #22304a 100%); border-color: #3a4a6a; }
.region-toggle.open { border-radius: 12px 12px 0 0; border-bottom-color: transparent; }
.region-toggle-name { font-size: 18px; font-weight: 700; color: #64b5f6; }
.region-toggle-meta { display: flex; align-items: center; gap: 12px; }
.region-toggle-count { background: rgba(100,181,246,0.15); color: #64b5f6; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
.region-toggle-areas { font-size: 12px; color: #6688aa; }
.chevron { color: #555; font-size: 18px; transition: transform 0.2s; }
.region-toggle.open .chevron { transform: rotate(180deg); }
.region-body { display: none; border: 1px solid #2a3a5a; border-top: none; border-radius: 0 0 12px 12px; padding: 8px 0; overflow: hidden; background: #12121a; }
.region-body.open { display: block; }
.area-section { margin: 4px 8px; }
.area-header { background: #1a1a2e; border: 1px solid #222240; border-radius: 8px; padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s; user-select: none; }
.area-header:hover { background: #1e1e36; border-color: #3a3a5a; }
.area-header.open { border-radius: 8px 8px 0 0; border-bottom-color: transparent; background: #1e1e36; }
.area-name { font-size: 15px; font-weight: 600; color: #fff; }
.area-meta { display: flex; align-items: center; gap: 10px; }
.area-count { background: #2a2a4a; color: #aaa; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
.area-avg { font-size: 12px; color: #ffd54f; }
.area-body { display: none; border: 1px solid #222240; border-top: none; border-radius: 0 0 8px 8px; margin: 0; overflow: hidden; }
.area-body.open { display: block; }
.climb-row { display: grid; grid-template-columns: 1fr 58px 52px 52px 28px; gap: 0; padding: 10px 18px; border-bottom: 1px solid #1a1a2e; align-items: center; transition: background 0.1s; }
.climb-row:hover { background: rgba(100,181,246,0.04); }
.climb-row:last-child { border-bottom: none; }
.climb-name { font-size: 14px; color: #e0e0e0; }
.climb-name a { color: #e0e0e0; text-decoration: none; }
.climb-name a:hover { color: #64b5f6; }
.climb-grade { font-size: 13px; font-weight: 600; text-align: center; padding: 2px 0; border-radius: 4px; }
.g5 { color: #81c784; } .g6 { color: #64b5f6; } .g7 { color: #e57373; } .g8 { color: #ce93d8; }
.climb-rating { text-align: center; font-size: 14px; font-weight: 600; }
.r-high { color: #ffd54f; } .r-med { color: #bbb; }
.climb-votes { text-align: center; font-size: 12px; color: #666; }
.climb-gps { text-align: center; font-size: 14px; }
.climb-gps a { color: #555; text-decoration: none; transition: color 0.15s; }
.climb-gps a:hover { color: #64b5f6; }
.climb-header { display: grid; grid-template-columns: 1fr 58px 52px 52px 28px; padding: 8px 18px; background: #12121a; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; border-bottom: 1px solid #1a1a2e; }
.footer { text-align: center; padding: 24px; color: #444; font-size: 12px; }
.hidden { display: none !important; }
.leaflet-popup-content { color: #222; font-size: 13px; line-height: 1.4; }
.leaflet-popup-content strong { font-size: 14px; }
.leaflet-popup-content a { color: #1a73e8; }
.open-gmaps-btn { position: absolute; bottom: 24px; right: 12px; z-index: 1000; background: #fff; color: #333; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
.open-gmaps-btn:hover { background: #f0f0f0; }
.open-gmaps-btn img { width: 20px; height: 20px; }
.map-legend { position: absolute; bottom: 24px; left: 12px; z-index: 1000; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 8px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 12px; color: #333; display: flex; gap: 10px; align-items: center; }
.map-legend-item { display: flex; align-items: center; gap: 4px; }
.map-legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }
@media (max-width: 500px) {
  .header h1 { font-size: 22px; }
  .filters { gap: 8px; }
  .slider-group { flex: 1 1 auto; }

  .filters input[type="text"] { width: 100%; flex: 1 1 100%; }
  .climb-row { grid-template-columns: 1fr 50px 44px 44px 24px; padding: 8px 12px; }
  .area-header { padding: 12px 14px; }
  .climb-header { padding: 6px 12px; }
  #mapView { min-height: 400px; height: calc(100vh - 300px); }
}

<div class="header">
  <h1>Font <span>Top Climbs</span></h1>
  <p>Fontainebleau's highest-rated boulders &mdash; 5a to 8b</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalCount">1376</div><div class="stat-label">Problems</div></div>
    <div class="stat"><div class="stat-num" id="regionCount">13</div><div class="stat-label">Regions</div></div>
    <div class="stat"><div class="stat-num" id="areaCount">88</div><div class="stat-label">Areas</div></div>
  </div>
  <div class="view-tabs">
    <div class="view-tab active" id="tabList" onclick="switchView('list')">List</div>
    <div class="view-tab" id="tabMap" onclick="switchView('map')">Map</div>
  </div>
</div>

<div class="filters" id="filtersBar">
  <label>Grade</label>
  <select id="gradeFilter">
    <option value="all">All</option>
    <option value="5">5a–5c+</option>
    <option value="6">6a–6c+</option>
    <option value="7">7a–7c+</option>
    <option value="8">8a–8b</option>
  </select>
  <div class="slider-group">
    <label>Rating</label>
    <input type="range" id="ratingFilter" min="3.5" max="5.0" step="0.1" value="3.5">
    <span class="slider-val" id="ratingVal">3.5+</span>
  </div>
  <div class="slider-group">
    <label>Votes</label>
    <input type="range" id="votesFilter" min="10" max="200" step="10" value="10">
    <span class="slider-val" id="votesVal">10+</span>
  </div>
  <input type="text" id="searchBox" placeholder="Search name or area...">
  <label>Sort</label>
  <select id="sortBy">
    <option value="rating">By Rating</option>
    <option value="grade">By Grade</option>
  </select>
</div>

<div class="container" id="container"></div>
<div id="mapWrapper" style="display:none;position:relative;">
  <div id="mapView" style="display:block;width:100%;height:calc(100vh - 260px);min-height:500px;"></div>

    Open in Google Maps
  </button>
  <div class="map-legend">
    <span style="font-weight:600;">Grade:</span>
    <span class="map-legend-item"><span class="map-legend-dot" style="background:#81c784;"></span>5</span>
    <span class="map-legend-item"><span class="map-legend-dot" style="background:#64b5f6;"></span>6</span>
    <span class="map-legend-item"><span class="map-legend-dot" style="background:#e57373;"></span>7</span>
    <span class="map-legend-item"><span class="map-legend-dot" style="background:#ce93d8;"></span>8</span>
  </div>
</div>
<div class="footer">Data from bleau.info &middot; GPS from Boolder &middot; March 2026 &middot; Ratings based on community votes</div>

let map = null;
let markers = null;
let currentView = 'list';

const GRADE_COLORS = {5: '#81c784', 6: '#64b5f6', 7: '#e57373', 8: '#ce93d8'};

function gradeNum(g) { return parseInt(g[0]); }
function gradeClass(g) {
  const n = gradeNum(g);
  if (n <= 5) return 'g5';
  if (n <= 6) return 'g6';
  if (n <= 7) return 'g7';
  return 'g8';
}
function ratingClass(r) { return r >= 4.0 ? 'r-high' : 'r-med'; }

function gradeSort(a, b) {
  const ga = a[1], gb = b[1];
  const na = parseInt(ga[0]), nb = parseInt(gb[0]);
  if (na !== nb) return na - nb;
  const la = ga.slice(1), lb = gb.slice(1);
  const order = {'a':0,'a+':1,'b':2,'b+':3,'c':4,'c+':5};
  return (order[la]||0) - (order[lb]||0);
}

function getFiltered() {
  const gradeF = document.getElementById('gradeFilter').value;
  const ratingF = parseFloat(document.getElementById('ratingFilter').value);
  const votesF = parseInt(document.getElementById('votesFilter').value);
  const searchF = document.getElementById('searchBox').value.toLowerCase();
  return DATA.filter(d => {
    if (gradeF !== 'all' && gradeNum(d[1]) !== parseInt(gradeF)) return false;
    if (d[3] < ratingF) return false;
    if (d[4] < votesF) return false;
    if (searchF && !d[0].toLowerCase().includes(searchF) && !d[2].toLowerCase().includes(searchF)) return false;
    return true;
  });
}

function switchView(view) {
  currentView = view;
  document.getElementById('tabList').classList.toggle('active', view === 'list');
  document.getElementById('tabMap').classList.toggle('active', view === 'map');
  document.getElementById('container').style.display = view === 'list' ? '' : 'none';
  document.getElementById('mapView').style.display = view === 'map' ? 'block' : 'none';
  if (view === 'map') {
    if (!map) initMap();
    else { map.invalidateSize(); updateMap(); }
  } else {
    render();
  }
}

function initMap() {
  map = L.map('mapView', {
    zoomControl: true,
    attributionControl: true
  }).setView([48.41, 2.60], 12);
  
  L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains: ['mt0','mt1','mt2','mt3'],
    attribution: '&copy; Google Maps'
  }).addTo(map);

  markers = L.layerGroup().addTo(map);

  // Add locate button
  const locBtn = L.control({position: 'topleft'});
  locBtn.onAdd = function() {
    const div = L.DomUtil.create('div', 'leaflet-bar');
    div.innerHTML = '<a href="#" id="locateBtn" title="Show my location" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;font-size:18px;background:#fff;text-decoration:none;color:#333;">&#9737;</a>';
    div.querySelector('a').addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      locateUser();
    });
    L.DomEvent.disableClickPropagation(div);
    return div;
  };
  locBtn.addTo(map);

  updateMap();
}

let userMarker = null;
let userCircle = null;

function locateUser() {
  const btn = document.getElementById('locateBtn');
  if (!btn) return;
  btn.style.color = '#64b5f6';
  btn.textContent = '...';

  if (!navigator.geolocation) {
    btn.textContent = '\u2299';
    btn.style.color = '#c00';
    setTimeout(() => { btn.style.color = '#333'; }, 2000);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      if (userMarker) { map.removeLayer(userMarker); }
      if (userCircle) { map.removeLayer(userCircle); }

      userMarker = L.circleMarker([lat, lng], {
        radius: 8,
        fillColor: '#4285f4',
        color: '#fff',
        weight: 3,
        opacity: 1,
        fillOpacity: 1
      }).addTo(map).bindPopup('You are here');

      userCircle = L.circle([lat, lng], {
        radius: acc,
        fillColor: '#4285f4',
        color: '#4285f4',
        weight: 1,
        opacity: 0.2,
        fillOpacity: 0.1
      }).addTo(map);

      map.setView([lat, lng], 15);
      btn.innerHTML = '&#9737;';
      btn.style.color = '#4285f4';
    },
    function(err) {
      btn.innerHTML = '&#9737;';
      btn.style.color = '#c00';
      setTimeout(() => { btn.style.color = '#333'; }, 2000);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function updateMap() {
  if (!markers) return;
  markers.clearLayers();
  const filtered = getFiltered();
  const bounds = [];
  
  filtered.forEach(p => {
    const gps = GPS[p[6]];
    if (!gps) return;
    const [lat, lng] = gps;
    bounds.push([lat, lng]);
    
    const n = gradeNum(p[1]);
    const color = GRADE_COLORS[Math.min(n, 8)] || '#999';
    
    const marker = L.circleMarker([lat, lng], {
      radius: Math.min(4 + p[3] * 1.5, 12),
      fillColor: color,
      color: '#fff',
      weight: 1,
      opacity: 0.8,
      fillOpacity: 0.8
    });
    
    const ratingStars = p[3] >= 4.0 ? '\u2b50' : '';
    marker.bindPopup(
      `<strong>${p[0]}</strong><br>` +
      `Grade: <strong style="color:${color}">${p[1]}</strong> &middot; Rating: <strong>${p[3].toFixed(1)}</strong> ${ratingStars} &middot; ${p[4]} votes<br>` +
      `Area: ${p[2]}<br>` +
      `<a href="https://bleau.info/${p[5]}/${p[6]}.html" target="_blank">View on bleau.info</a> &middot; ` +
      `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">Google Maps</a>`,
      { maxWidth: 300 }
    );
    markers.addLayer(marker);
  });
  
  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }
  
  document.getElementById('totalCount').textContent = filtered.length;
}

function render() {
  const sortBy = document.getElementById('sortBy').value;
  const filtered = getFiltered();

  const areas = {};
  const areaOrder = [];
  filtered.forEach(d => {
    if (!areas[d[2]]) { areas[d[2]] = []; areaOrder.push(d[2]); }
    areas[d[2]].push(d);
  });

  Object.values(areas).forEach(problems => {
    if (sortBy === 'grade') {
      problems.sort((a, b) => gradeSort(a, b) || (b[3] - a[3]));
    } else {
      problems.sort((a, b) => (b[3] - a[3]) || (b[4] - a[4]));
    }
  });

  const regionAreas = {};
  areaOrder.forEach(area => {
    const region = REGIONS[area] || 'Other';
    if (!regionAreas[region]) regionAreas[region] = [];
    regionAreas[region].push(area);
  });

  const allRegions = [...REGION_ORDER];
  if (regionAreas['Other']) allRegions.push('Other');

  document.getElementById('totalCount').textContent = filtered.length;
  const activeRegions = allRegions.filter(r => regionAreas[r] && regionAreas[r].length > 0);
  document.getElementById('regionCount').textContent = activeRegions.length;
  document.getElementById('areaCount').textContent = areaOrder.length;

  const searchF = document.getElementById('searchBox').value.trim();
  const autoExpand = searchF.length > 0;

  const container = document.getElementById('container');
  container.innerHTML = '';

  allRegions.forEach(region => {
    const regionAreaList = regionAreas[region];
    if (!regionAreaList || regionAreaList.length === 0) return;

    const regionProblems = regionAreaList.reduce((sum, a) => sum + areas[a].length, 0);

    const regionSection = document.createElement('div');
    regionSection.className = 'region-section';

    const regionToggle = document.createElement('div');
    regionToggle.className = 'region-toggle';
    regionToggle.innerHTML = `
      <span class="region-toggle-name">${region}</span>
      <div class="region-toggle-meta">
        <span class="region-toggle-areas">${regionAreaList.length} area${regionAreaList.length > 1 ? 's' : ''}</span>
        <span class="region-toggle-count">${regionProblems}</span>
        <span class="chevron">\u25bc</span>
      </div>`;

    const regionBody = document.createElement('div');
    regionBody.className = 'region-body';

    regionAreaList.forEach(area => {
      const problems = areas[area];
      const avgRating = (problems.reduce((s, p) => s + p[3], 0) / problems.length).toFixed(1);

      const section = document.createElement('div');
      section.className = 'area-section';

      const header = document.createElement('div');
      header.className = 'area-header';
      header.innerHTML = `
        <span class="area-name">${area}</span>
        <div class="area-meta">
          <span class="area-avg">\u2605 ${avgRating}</span>
          <span class="area-count">${problems.length}</span>
          <span class="chevron">\u25bc</span>
        </div>`;

      const body = document.createElement('div');
      body.className = 'area-body';

      body.innerHTML = '<div class="climb-header"><span>Problem</span><span style="text-align:center">Grade</span><span style="text-align:center">Rating</span><span style="text-align:center">Votes</span><span></span></div>';

      problems.forEach(p => {
        const row = document.createElement('div');
        row.className = 'climb-row';
        const gps = GPS[p[6]];
        const pin = gps ? `<a href="https://www.google.com/maps?q=${gps[0]},${gps[1]}" target="_blank" rel="noopener" title="${gps[0]}, ${gps[1]}">\ud83d\udccd</a>` : '';
        row.innerHTML = `
          <span class="climb-name"><a href="https://bleau.info/${p[5]}/${p[6]}.html" target="_blank" rel="noopener">${p[0]}</a></span>
          <span class="climb-grade ${gradeClass(p[1])}">${p[1]}</span>
          <span class="climb-rating ${ratingClass(p[3])}">${p[3].toFixed(1)}</span>
          <span class="climb-votes">${p[4]}</span>
          <span class="climb-gps">${pin}</span>`;
        body.appendChild(row);
      });

      header.addEventListener('click', () => {
        header.classList.toggle('open');
        body.classList.toggle('open');
      });

      if (autoExpand) {
        header.classList.add('open');
        body.classList.add('open');
      }

      section.appendChild(header);
      section.appendChild(body);
      regionBody.appendChild(section);
    });

    regionToggle.addEventListener('click', () => {
      regionToggle.classList.toggle('open');
      regionBody.classList.toggle('open');
    });

    if (autoExpand) {
      regionToggle.classList.add('open');
      regionBody.classList.add('open');
    }

    regionSection.appendChild(regionToggle);
    regionSection.appendChild(regionBody);
    container.appendChild(regionSection);
  });
}

function onFilter() { currentView === 'map' ? updateMap() : render(); }

document.getElementById('gradeFilter').addEventListener('change', onFilter);
document.getElementById('searchBox').addEventListener('input', onFilter);
document.getElementById('sortBy').addEventListener('change', onFilter);

document.getElementById('ratingFilter').addEventListener('input', () => {
  const v = parseFloat(document.getElementById('ratingFilter').value);
  document.getElementById('ratingVal').textContent = v.toFixed(1) + '+';
  onFilter();
});

document.getElementById('votesFilter').addEventListener('input', () => {
  const v = parseInt(document.getElementById('votesFilter').value);
  document.getElementById('votesVal').textContent = v + '+';
  onFilter();
});

render();
</script>
</body>
</html>
