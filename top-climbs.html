* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }

.stats { display: flex; justify-content: center; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
.stat { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 8px 16px; }
.stat-num { font-size: 22px; font-weight: 700; color: #64b5f6; }
.stat-label { font-size: 11px; color: #8888aa; text-transform: uppercase; letter-spacing: 1px; }
.filters { padding: 16px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; max-width: 800px; margin: 0 auto; }
.filters label { font-size: 12px; color: #8888aa; text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }

.filters input { width: 180px; }
.container { max-width: 800px; margin: 0 auto; padding: 0 12px 40px; }
.area-section { margin-bottom: 4px; }
.area-header { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s; user-select: none; }
.area-header:hover { background: #1e1e36; border-color: #3a3a5a; }
.area-header.open { border-radius: 10px 10px 0 0; border-bottom-color: transparent; background: #1e1e36; }
.area-name { font-size: 17px; font-weight: 600; color: #fff; }
.area-meta { display: flex; align-items: center; gap: 12px; }
.area-count { background: #2a2a4a; color: #64b5f6; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
.area-avg { font-size: 13px; color: #ffd54f; }
.chevron { color: #555; font-size: 18px; transition: transform 0.2s; }
.area-header.open .chevron { transform: rotate(180deg); }
.area-body { display: none; border: 1px solid #2a2a4a; border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
.area-body.open { display: block; }
.climb-row { display: grid; grid-template-columns: 1fr 58px 52px 52px; gap: 0; padding: 10px 18px; border-bottom: 1px solid #1a1a2e; align-items: center; transition: background 0.1s; }
.climb-row:hover { background: rgba(100,181,246,0.04); }
.climb-row:last-child { border-bottom: none; }
.climb-name { font-size: 14px; color: #e0e0e0; }
.climb-name a { color: #e0e0e0; text-decoration: none; }
.climb-name a:hover { color: #64b5f6; }
.climb-grade { font-size: 13px; font-weight: 600; text-align: center; padding: 2px 0; border-radius: 4px; }
.g5 { color: #81c784; } .g6 { color: #64b5f6; } .g7 { color: #e57373; } .g8 { color: #ce93d8; }
.climb-rating { text-align: center; font-size: 14px; font-weight: 600; }
.r-high { color: #ffd54f; } .r-med { color: #bbb; }
.climb-votes { text-align: center; font-size: 12px; color: #666; }
.climb-header { display: grid; grid-template-columns: 1fr 58px 52px 52px; padding: 8px 18px; background: #12121a; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; border-bottom: 1px solid #1a1a2e; }
.footer { text-align: center; padding: 24px; color: #444; font-size: 12px; }
.hidden { display: none !important; }
.region-header { padding: 18px 14px 8px; margin-top: 16px; }
.region-header:first-child { margin-top: 0; }
.region-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #64b5f6; }
.region-line { height: 1px; background: linear-gradient(90deg, #64b5f6 0%, transparent 60%); margin-top: 6px; }
@media (max-width: 500px) {
  .header h1 { font-size: 22px; }
  .climb-row { grid-template-columns: 1fr 50px 44px 44px; padding: 8px 12px; }
  .area-header { padding: 12px 14px; }
  .climb-header { padding: 6px 12px; }
}

["Atrésie (assis)","8a","Rempart",3.9,32,"rempart","1618"],
["Le 9 à la Coq","6a","Troche",3.5,28,"troche","15127"]
];

const REGIONS = {
  "Bas Cuvier": "Cuvier-Ch\u00e2tillon", "Cuvier Nord": "Cuvier-Ch\u00e2tillon", "Cuvier Ouest": "Cuvier-Ch\u00e2tillon",
  "Merveille": "Cuvier-Ch\u00e2tillon", "Petit Rempart": "Cuvier-Ch\u00e2tillon", "Bellevue": "Cuvier-Ch\u00e2tillon",
  "Rempart": "Cuvier-Ch\u00e2tillon",
  "Butte aux Dames": "Apremont",
  "Cuisini\u00e8re": "Franchard", "Rocher Raymond": "Franchard", "Hautepierre": "Franchard",
  "\u00c9l\u00e9phant": "Larchant", "Dame Jouanne": "Larchant", "Maunoury": "Larchant",
  "Grande Montagne": "Trois Pignons Sud", "Rocher Gr\u00e9au": "Nemours",
  "Canche aux Merciers": "Trois Pignons Est", "Cornebiche": "Trois Pignons Est",
  "Bois Rond / Auberge": "Trois Pignons Est",
  "Franchard Envers": "Franchard",
  "Hercule": "Nord Fontainebleau", "Montussy Est": "Nord Fontainebleau",
  "Troche": "Yvelines & Essonne Nord",
};
const REGION_ORDER = ["Cuvier-Ch\u00e2tillon","Apremont","Franchard","Larchant","Trois Pignons Est","Trois Pignons Sud","Nord Fontainebleau","Nemours","Yvelines & Essonne Nord"];

function gradeNum(g) {
  return parseInt(g[0]);
}
function gradeClass(g) {
  const n = gradeNum(g);
  if (n <= 5) return 'g5';
  if (n <= 6) return 'g6';
  if (n <= 7) return 'g7';
  return 'g8';
}
function ratingClass(r) { return r >= 4.0 ? 'r-high' : 'r-med'; }
function stars(r) {
  const full = Math.floor(r);
  const half = r - full >= 0.3 ? 1 : 0;
  return '\u2605'.repeat(full) + (half ? '\u00BD' : '');
}

function gradeSort(a, b) {
  const ga = a[1], gb = b[1];
  const na = parseInt(ga[0]), nb = parseInt(gb[0]);
  if (na !== nb) return na - nb;
  const la = ga.slice(1), lb = gb.slice(1);
  const order = {'a':0,'a+':1,'b':2,'b+':3,'c':4,'c+':5};
  return (order[la]||0) - (order[lb]||0);
}

function render() {
  const gradeF = document.getElementById('gradeFilter').value;
  const ratingF = parseFloat(document.getElementById('ratingFilter').value);
  const searchF = document.getElementById('searchBox').value.toLowerCase();
  const sortBy = document.getElementById('sortBy').value;

  const filtered = DATA.filter(d => {
    if (gradeF !== 'all' && gradeNum(d[1]) !== parseInt(gradeF)) return false;
    if (d[3] < ratingF) return false;
    if (searchF && !d[0].toLowerCase().includes(searchF) && !d[2].toLowerCase().includes(searchF)) return false;
    return true;
  });

  // Group by area
  const areas = {};
  const areaOrder = [];
  filtered.forEach(d => {
    if (!areas[d[2]]) { areas[d[2]] = []; areaOrder.push(d[2]); }
    areas[d[2]].push(d);
  });

  // Sort problems within each area
  Object.values(areas).forEach(problems => {
    if (sortBy === 'grade') {
      problems.sort((a, b) => gradeSort(a, b) || (b[3] - a[3]));
    } else {
      problems.sort((a, b) => (b[3] - a[3]) || (b[4] - a[4]));
    }
  });

  // Group areas by region
  const regionAreas = {};
  areaOrder.forEach(area => {
    const region = REGIONS[area] || 'Other';
    if (!regionAreas[region]) regionAreas[region] = [];
    regionAreas[region].push(area);
  });

  document.getElementById('totalCount').textContent = filtered.length;
  document.getElementById('areaCount').textContent = areaOrder.length;

  const container = document.getElementById('container');
  container.innerHTML = '';

  REGION_ORDER.forEach(region => {
    const regionAreaList = regionAreas[region];
    if (!regionAreaList || regionAreaList.length === 0) return;

    // Region header
    const rh = document.createElement('div');
    rh.className = 'region-header';
    rh.innerHTML = `<div class="region-name">${region}</div><div class="region-line"></div>`;
    container.appendChild(rh);

    regionAreaList.forEach(area => {
      const problems = areas[area];
      const avgRating = (problems.reduce((s, p) => s + p[3], 0) / problems.length).toFixed(1);

      const section = document.createElement('div');
      section.className = 'area-section';

      const header = document.createElement('div');
      header.className = 'area-header';
      header.innerHTML = `
        <span class="area-name">${area}</span>
        <div class="area-meta">
          <span class="area-avg">\u2605 ${avgRating}</span>
          <span class="area-count">${problems.length}</span>
          <span class="chevron">\u25BC</span>
        </div>`;

      const body = document.createElement('div');
      body.className = 'area-body';

      body.innerHTML = '<div class="climb-header"><span>Problem</span><span style="text-align:center">Grade</span><span style="text-align:center">Rating</span><span style="text-align:center">Votes</span></div>';

      problems.forEach(p => {
        const row = document.createElement('div');
        row.className = 'climb-row';
        row.innerHTML = `
          <span class="climb-name"><a href="https://bleau.info/${p[5]}/${p[6]}.html" target="_blank" rel="noopener">${p[0]}</a></span>
          <span class="climb-grade ${gradeClass(p[1])}">${p[1]}</span>
          <span class="climb-rating ${ratingClass(p[3])}">${p[3].toFixed(1)}</span>
          <span class="climb-votes">${p[4]}</span>`;
        body.appendChild(row);
      });

      header.addEventListener('click', () => {
        header.classList.toggle('open');
        body.classList.toggle('open');
      });

      section.appendChild(header);
      section.appendChild(body);
      container.appendChild(section);
    });
  });

  // Handle any areas not in a known region
  if (regionAreas['Other']) {
    const rh = document.createElement('div');
    rh.className = 'region-header';
    rh.innerHTML = `<div class="region-name">Other</div><div class="region-line"></div>`;
    container.appendChild(rh);
    regionAreas['Other'].forEach(area => {
      const problems = areas[area];
      const avgRating = (problems.reduce((s, p) => s + p[3], 0) / problems.length).toFixed(1);
      const section = document.createElement('div');
      section.className = 'area-section';
      const header = document.createElement('div');
      header.className = 'area-header';
      header.innerHTML = `<span class="area-name">${area}</span><div class="area-meta"><span class="area-avg">\u2605 ${avgRating}</span><span class="area-count">${problems.length}</span><span class="chevron">\u25BC</span></div>`;
      const body = document.createElement('div');
      body.className = 'area-body';
      body.innerHTML = '<div class="climb-header"><span>Problem</span><span style="text-align:center">Grade</span><span style="text-align:center">Rating</span><span style="text-align:center">Votes</span></div>';
      problems.forEach(p => {
        const row = document.createElement('div');
        row.className = 'climb-row';
        row.innerHTML = `<span class="climb-name"><a href="https://bleau.info/${p[5]}/${p[6]}.html" target="_blank" rel="noopener">${p[0]}</a></span><span class="climb-grade ${gradeClass(p[1])}">${p[1]}</span><span class="climb-rating ${ratingClass(p[3])}">${p[3].toFixed(1)}</span><span class="climb-votes">${p[4]}</span>`;
        body.appendChild(row);
      });
      header.addEventListener('click', () => { header.classList.toggle('open'); body.classList.toggle('open'); });
      section.appendChild(header); section.appendChild(body); container.appendChild(section);
    });
  }
}

document.getElementById('gradeFilter').addEventListener('change', render);
document.getElementById('ratingFilter').addEventListener('change', render);
document.getElementById('searchBox').addEventListener('input', render);
document.getElementById('sortBy').addEventListener('change', render);

render();

// Open first area by default
const first = document.querySelector('.area-header');
if (first) first.click();
</script>
</body>
